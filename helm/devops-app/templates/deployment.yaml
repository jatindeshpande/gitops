apiVersion: apps/v1
kind: Deployment
metadata: 
  name: devops-app
spec: 
  replicas:
  selector:
    matchLabels: 
      app: devops-app
  template:
    metadata:
      labels: 
        app: devops-app
    spec:
      containers: 
        - name: devops-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
    
